<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Directivo - SER Ambiental</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f8; color: #333; margin: 0; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .header { display: flex; justify-content: space-between; border-bottom: 3px solid #2D5A27; padding-bottom: 15px; margin-bottom: 25px; align-items: center; }
    .header h1 { color: #2D5A27; margin: 0; font-size: 24px; text-transform: uppercase; }
    .header p { margin: 5px 0 0 0; color: #666; font-size: 14px; }
    
    .selector-container { background: #2D5A27; padding: 20px; border-radius: 8px; margin-bottom: 30px; text-align: center; color: white; }
    select { padding: 10px; font-size: 16px; border-radius: 5px; border: none; width: 80%; max-width: 400px; cursor: pointer; }
    
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #f9fbf9; padding: 15px; border-radius: 8px; margin-bottom: 30px; }
    .info-item span { font-weight: bold; color: #2D5A27; }
    .chart-container { width: 100%; max-width: 500px; margin: 0 auto 40px auto; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th { background-color: #2D5A27; color: white; padding: 12px; text-align: left; }
    td { padding: 12px; border-bottom: 1px solid #eee; }
    .tendencia { font-weight: bold; color: #444; }
    #loading { text-align: center; color: #2D5A27; font-size: 18px; margin-top: 50px; font-weight: bold; }
    #dashboard { display: none; }
  </style>
</head>
<body>

  <div id="loading">Sincronizando base de datos de candidatos...</div>

  <div class="container" id="dashboard">
    <div class="header">
      <div><h1>Panel de Resultados</h1><p>SER Ambiental S.A.S ESP</p></div>
    </div>

    <div class="selector-container">
      <label for="lista-candidatos" style="display:block; margin-bottom:10px; font-weight:bold;">Seleccione un candidato para ver su perfil:</label>
      <select id="lista-candidatos" onchange="mostrarCandidato(this.value)"></select>
    </div>

    <div class="info-grid">
      <div class="info-item"><span>Nombre:</span> <span id="val-nombre"></span></div>
      <div class="info-item"><span>Fecha de Test:</span> <span id="val-fecha"></span></div>
      <div class="info-item"><span>Correo:</span> <span id="val-correo"></span></div>
      <div class="info-item"><span>Experiencia:</span> <span id="val-exp"></span></div>
    </div>

    <h3 style="color: #2D5A27; text-align: center;">Gráfico de Dimensiones (Escala 1 a 4)</h3>
    <div class="chart-container"><canvas id="radarChart"></canvas></div>

    <h3 style="color: #2D5A27;">Análisis de Tendencias</h3>
    <table>
      <thead><tr><th>Dimensión</th><th>Puntaje</th><th>Tendencia Predominante</th></tr></thead>
      <tbody id="tabla-tendencias"></tbody>
    </table>
  </div>

  <script>
    // 1. PEGA AQUÍ LA URL EXACTA QUE SALE EN LA BARRA DE DIRECCIONES DE TU FOTO
    const csvUrl = 'https://docs.google.com/spreadsheets/u/1/d/e/2PACX-1vQ5f_FRIjEuKWkWLETxobaqxwb8nFsYv-NYHiIlBpjG3e8cQxFP6K7i2NmkmFGpaqtJqR3_G2mTTRTS/pubhtml?gid=2020114578&single=true';
    
    let baseDeDatos = [];
    let graficoActual = null;

    Papa.parse(csvUrl, {
      download: true,
      header: false,
      complete: function(results) {
        const filas = results.data;
        const selector = document.getElementById('lista-candidatos');
        
        selector.innerHTML = '<option value="">-- Seleccione un candidato --</option>';

        filas.forEach((fila, index) => {
          const nombre = fila[2]; // Basado en tu foto, el nombre es la posición 2
          
          if(nombre && nombre.trim() !== "" && nombre.toLowerCase() !== "nombre" && nombre.toLowerCase() !== "nombre del candidato" && nombre.toLowerCase() !== "marca temporal") {
            baseDeDatos[index] = fila; 
            let opcion = document.createElement('option');
            opcion.value = index;
            opcion.text = nombre;
            selector.appendChild(opcion);
          }
        });

        document.getElementById('loading').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
      }
    });

    function mostrarCandidato(indexFila) {
      if(!indexFila || indexFila === "") return;
      
      const fila = baseDeDatos[indexFila];
      
      // Extracción milimétrica basada en tu foto
      document.getElementById('val-fecha').innerText = fila[0];
      document.getElementById('val-correo').innerText = fila[1];
      document.getElementById('val-nombre').innerText = fila[2];
      document.getElementById('val-cargo').innerText = fila[3]; // Si no tienes cargo, saldrá vacío
      document.getElementById('val-exp').innerText = fila[4];

      // Los puntajes matemáticos están en las posiciones 53 a 58
      const p = [
        parseFloat(fila[53]), parseFloat(fila[54]), parseFloat(fila[55]), 
        parseFloat(fila[56]), parseFloat(fila[57]), parseFloat(fila[58])
      ];

      // Nombres y lógicas (Escala 1 a 4, punto medio 2.5)
      const nombres = ["Toma de Decisiones", "Motivación", "Presión y Cambio", "Relaciones", "Ejecución", "Disponibilidad"];
      const textos = [
        p[0] < 2.5 ? "Analítico y riguroso" : "Ágil y resolutivo",
        p[1] < 2.5 ? "Estabilidad y seguridad" : "Logro y crecimiento",
        p[2] < 2.5 ? "Estructura y planificación" : "Adaptabilidad y flexibilidad",
        p[3] < 2.5 ? "Trabajo individual" : "Trabajo colaborativo",
        p[4] < 2.5 ? "Estratégico y global" : "Operativo y detallista",
        p[5] < 2.5 ? "Horario fijo y predecible" : "Disponibilidad amplia"
      ];

      let htmlTabla = '';
      for(let i=0; i<6; i++){
        htmlTabla += `<tr>
          <td>${nombres[i]}</td>
          <td style="text-align:center; font-weight:bold; color:#2D5A27;">${(p[i] || 0).toFixed(1)}</td>
          <td class="tendencia">${textos[i]}</td>
        </tr>`;
      }
      document.getElementById('tabla-tendencias').innerHTML = htmlTabla;

      if(graficoActual) { graficoActual.destroy(); }

      const ctx = document.getElementById('radarChart').getContext('2d');
      graficoActual = new Chart(ctx, {
        type: 'radar',
        data: {
          labels: nombres,
          datasets: [{
            label: 'Puntaje de ' + fila[2],
            data: p,
            backgroundColor: 'rgba(45, 90, 39, 0.2)', 
            borderColor: 'rgba(45, 90, 39, 1)',       
            pointBackgroundColor: 'rgba(45, 90, 39, 1)',
            borderWidth: 2
          }]
        },
        options: { 
          scales: { 
            r: { 
              min: 1, 
              max: 4, 
              ticks: { stepSize: 1 } 
            } 
          } 
        }
      });
    }
  </script>
</body>
</html>
